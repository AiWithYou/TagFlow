name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core test dependencies
        run: python -m pip install "requests>=2.31.0" "Pillow>=10.0.0"

      - name: Validate preset JSON
        run: python tools/validate_presets.py

      - name: Compile Python sources
        run: python -m py_compile TagFlow.py tagflow_entry.py tagflow_core/*.py tools/*.py

      - name: Run core unit tests
        run: python -m unittest discover -s tests -v

      - name: Check dataset audit CLI
        run: python tools/audit_dataset.py --help

      - name: Export source snapshot for implementation tooling
        uses: actions/upload-artifact@v4
        with:
          name: tagflow-source-${{ github.sha }}
          path: .
          include-hidden-files: true
          retention-days: 1
